name: Run E2E tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Node (for Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore
        working-directory: PlaywrightTests
        run: dotnet restore

      - name: Build (Debug)
        working-directory: PlaywrightTests
        run: dotnet build -c Debug --no-restore

      - name: Install Playwright browsers
        working-directory: PlaywrightTests
        run: pwsh -ExecutionPolicy Bypass -File ./bin/Debug/net10.0/playwright.ps1 install --with-deps

      - name: Run tests
        working-directory: PlaywrightTests
        run: dotnet test -c Debug --no-build -v minimal

      - name: Install Allure CLI
        if: always()
        run: npm i -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p PlaywrightTests/allure-results
          allure generate PlaywrightTests/allure-results -o PlaywrightTests/allure-report --clean

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: PlaywrightTests/allure-report

